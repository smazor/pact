<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCore + Vincul Stack</title>
<style>
  body { margin: 0; overflow: hidden; background: #fff; }
  svg { display: block; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2da44e"/>
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cf222e"/>
    </marker>
    <marker id="ah-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8250df"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" fill="#fff"/>

  <!-- ═══ APPLICATIONS LAYER ═══ -->
  <rect x="100" y="30" width="700" height="60" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="53" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="700" fill="#656d76" letter-spacing="1">APPLICATIONS / ORCHESTRATORS</text>
  <text x="450" y="73" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8b949e">LangGraph · OpenAI Agents SDK · Google ADK · AutoGen · CrewAI · custom apps</text>

  <!-- Arrow: Apps → AgentCore -->
  <line x1="450" y1="90" x2="450" y2="128" stroke="#444" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══ AGENTCORE LAYER ═══ -->
  <rect x="100" y="130" width="700" height="100" rx="8" fill="#ddf4ff" stroke="#54aeff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#0969da" letter-spacing="1">AMAZON BEDROCK AGENTCORE</text>

  <!-- AgentCore service boxes -->
  <rect x="125" y="168" width="85" height="42" rx="6" fill="#fff" stroke="#54aeff" stroke-width="1"/>
  <text x="167" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#0969da">Runtime</text>

  <rect x="222" y="168" width="85" height="42" rx="6" fill="#fff" stroke="#54aeff" stroke-width="1"/>
  <text x="264" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#0969da">Identity</text>

  <rect x="319" y="168" width="85" height="42" rx="6" fill="#fff" stroke="#54aeff" stroke-width="1"/>
  <text x="361" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#0969da">Gateway</text>

  <rect x="416" y="168" width="85" height="42" rx="6" fill="#fff" stroke="#54aeff" stroke-width="1"/>
  <text x="458" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#0969da">Policy</text>

  <rect x="513" y="168" width="85" height="42" rx="6" fill="#fff" stroke="#54aeff" stroke-width="1"/>
  <text x="555" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#0969da">A2A</text>

  <rect x="610" y="168" width="110" height="42" rx="6" fill="#fff" stroke="#54aeff" stroke-width="1"/>
  <text x="665" y="193" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#0969da">Observability</text>

  <!-- Arrow: AgentCore → Enforcement (with label) -->
  <line x1="450" y1="230" x2="450" y2="298" stroke="#444" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="330" y="250" width="240" height="22" rx="4" fill="#fff8c5" stroke="#d4a72c" stroke-width="1"/>
  <text x="450" y="265" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#9a6700">COMMIT-class actions only</text>


<!-- ═══ VINCUL ENFORCEMENT PLANE ═══ -->
  <rect x="100" y="300" width="700" height="120" rx="8" fill="#fff8e1" stroke="#d4a72c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="325" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#9a6700" letter-spacing="1">VINCUL ENFORCEMENT PLANE</text>

  <!-- 7-step pipeline boxes -->
  <rect x="115" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="154" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">1</text>
  <text x="154" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Contract</text>

  <rect x="201" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="240" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">2</text>
  <text x="240" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Scope</text>

  <rect x="287" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="326" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">3</text>
  <text x="326" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Op Type</text>

  <rect x="373" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="412" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">4</text>
  <text x="412" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Namespace</text>

  <rect x="459" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="498" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">5</text>
  <text x="498" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Predicate</text>

  <rect x="545" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="584" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">6</text>
  <text x="584" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Ceiling</text>

  <rect x="631" y="340" width="78" height="60" rx="6" fill="#fff" stroke="#d4a72c" stroke-width="1"/>
  <text x="670" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" font-weight="700" fill="#9a6700">7</text>
  <text x="670" y="388" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#9a6700">Budget</text>

  <!-- Arrows between steps -->
  <line x1="193" y1="370" x2="201" y2="370" stroke="#d4a72c" stroke-width="1"/>
  <line x1="279" y1="370" x2="287" y2="370" stroke="#d4a72c" stroke-width="1"/>
  <line x1="365" y1="370" x2="373" y2="370" stroke="#d4a72c" stroke-width="1"/>
  <line x1="451" y1="370" x2="459" y2="370" stroke="#d4a72c" stroke-width="1"/>
  <line x1="537" y1="370" x2="545" y2="370" stroke="#d4a72c" stroke-width="1"/>
  <line x1="623" y1="370" x2="631" y2="370" stroke="#d4a72c" stroke-width="1"/>

  <!-- ═══ BRANCH: ALLOW / DENY ═══ -->

  <!-- Arrow to Allow -->
  <line x1="350" y1="420" x2="280" y2="478" stroke="#2da44e" stroke-width="1.5" marker-end="url(#ah-green)"/>
  <!-- Arrow to Deny -->
  <line x1="550" y1="420" x2="620" y2="478" stroke="#cf222e" stroke-width="1.5" marker-end="url(#ah-red)"/>

  <!-- Allow box -->
  <rect x="150" y="480" width="220" height="60" rx="8" fill="#dafbe1" stroke="#2da44e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="506" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#1a7f37">ALLOW</text>
  <text x="260" y="524" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#2da44e">Tool / workflow executes</text>

  <!-- Deny box -->
  <rect x="530" y="480" width="220" height="60" rx="8" fill="#ffebe9" stroke="#cf222e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="506" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#cf222e">DENY</text>
  <text x="640" y="524" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#cf222e">Failure recorded</text>

  <!-- Arrow: Allow → Settlement -->
  <line x1="260" y1="540" x2="350" y2="608" stroke="#8250df" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <!-- Arrow: Deny → Settlement -->
  <line x1="640" y1="540" x2="550" y2="608" stroke="#8250df" stroke-width="1.5" marker-end="url(#ah-purple)"/>

  <!-- ═══ VINCUL SETTLEMENT PLANE ═══ -->
  <rect x="150" y="610" width="600" height="70" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="637" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#8250df" letter-spacing="1">VINCUL SETTLEMENT PLANE</text>
  <text x="450" y="660" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#a475d6">ReceiptLog · commitment/failure receipts · ledger snapshots · attestations</text>

  <!-- Arrow: Settlement → CloudWatch -->
  <line x1="450" y1="680" x2="450" y2="718" stroke="#444" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ═══ CLOUDWATCH EXPORT ═══ -->
  <rect x="250" y="720" width="400" height="50" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="743" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#656d76" letter-spacing="1">CLOUDWATCH / OTEL EXPORT</text>
  <text x="450" y="759" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#8b949e">Search and dashboards</text>

</svg>
</body>
</html>
